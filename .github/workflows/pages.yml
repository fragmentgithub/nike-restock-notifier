name: Nike Restock Monitor and Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    outputs:
      next_due_minutes: ${{ steps.monitor.outputs.next_due_minutes }}
      should_chain: ${{ steps.monitor.outputs.should_chain }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # テストは別ワークフロー(test.yml)で実行する。テスト失敗が在庫監視・通知・Pages更新を
      # 止めないよう、監視ジョブからは意図的に切り離している。

      - name: Restore monitor state
        uses: actions/cache/restore@v6
        with:
          path: .monitor-state
          key: nike-monitor-state-${{ github.run_id }}
          restore-keys: |
            nike-monitor-state-

      - name: Check Nike stock
        id: monitor
        env:
          PRODUCT_URL: ${{ vars.PRODUCT_URL }}
          PRODUCT_URLS: ${{ vars.PRODUCT_URLS }}
          SIZE_FILTERS: ${{ vars.SIZE_FILTERS }}
          INTERVAL_SECONDS: ${{ vars.INTERVAL_SECONDS }}
          LOOP_MINUTES: ${{ vars.LOOP_MINUTES }}
          DISCOVERY_URL: ${{ vars.DISCOVERY_URL }}
          DISCOVERY_INTERVAL_HOURS: ${{ vars.DISCOVERY_INTERVAL_HOURS }}
          DISCOVERY_RETRY_MINUTES: ${{ vars.DISCOVERY_RETRY_MINUTES }}
          PRODUCT_CHECK_DELAY_MS: ${{ vars.PRODUCT_CHECK_DELAY_MS }}
          PRODUCT_CONFIG_JSON: ${{ vars.PRODUCT_CONFIG_JSON }}
          DELIST_FAILURE_THRESHOLD: ${{ vars.DELIST_FAILURE_THRESHOLD }}
          PAUSED_RECHECK_HOURS: ${{ vars.PAUSED_RECHECK_HOURS }}
          UPCOMING_INTERVAL_SECONDS: ${{ vars.UPCOMING_INTERVAL_SECONDS }}
          UPCOMING_WINDOW_MINUTES: ${{ vars.UPCOMING_WINDOW_MINUTES }}
          DISCORD_MENTION: ${{ vars.DISCORD_MENTION }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/monitor.js

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .monitor-state
          key: nike-monitor-state-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


  # 自己連鎖に必要な actions:write は短時間の専用ジョブだけへ付与する。
  queue-next-run:
    if: always()
    needs: monitor-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      # cronの発火遅延(実測1時間超もある)に依存せず監視を連続させるための自己連鎖。
      # 実行が異常終了して連鎖が切れた場合はcronがバックアップとして再開する。
      - name: Queue next monitor run
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_DUE_MINUTES: ${{ needs.monitor-and-deploy.outputs.next_due_minutes }}
          SHOULD_CHAIN: ${{ needs.monitor-and-deploy.outputs.should_chain }}
        run: |
          if [ "$SHOULD_CHAIN" != "true" ]; then
            echo "Immediate chaining is unnecessary (next due: ${NEXT_DUE_MINUTES:-none} minutes); the cron backup will resume monitoring."
            exit 0
          fi
          waiting_count=0
          for status in queued pending waiting requested; do
            count="$(gh run list --repo ${{ github.repository }} --workflow pages.yml --status "$status" --limit 20 --json databaseId --jq 'length')"
            waiting_count=$((waiting_count + count))
          done
          if [ "$waiting_count" -eq 0 ]; then
            gh workflow run pages.yml --ref main --repo ${{ github.repository }}
          else
            echo "A newer monitor run is already queued; skipping self-dispatch."
          fi
