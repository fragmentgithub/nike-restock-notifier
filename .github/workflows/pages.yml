name: Nike Restock Monitor and Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run tests
        run: npm test

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state
          key: nike-monitor-state-${{ github.run_id }}
          restore-keys: |
            nike-monitor-state-

      - name: Check Nike stock
        env:
          PRODUCT_URL: ${{ vars.PRODUCT_URL }}
          PRODUCT_URLS: ${{ vars.PRODUCT_URLS }}
          SIZE_FILTERS: ${{ vars.SIZE_FILTERS }}
          INTERVAL_SECONDS: ${{ vars.INTERVAL_SECONDS }}
          LOOP_MINUTES: ${{ vars.LOOP_MINUTES }}
          DISCOVERY_URL: ${{ vars.DISCOVERY_URL }}
          DISCOVERY_INTERVAL_HOURS: ${{ vars.DISCOVERY_INTERVAL_HOURS }}
          DISCOVERY_RETRY_MINUTES: ${{ vars.DISCOVERY_RETRY_MINUTES }}
          PRODUCT_CHECK_DELAY_MS: ${{ vars.PRODUCT_CHECK_DELAY_MS }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/monitor.js

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor-state
          key: nike-monitor-state-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # cronの発火遅延(実測1時間超もある)に依存せず監視を連続させるための自己連鎖。
      # 実行が異常終了して連鎖が切れた場合はcronがバックアップとして再開する。
      - name: Queue next monitor run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued_count="$(gh run list --workflow pages.yml --status queued --limit 10 --json databaseId --jq 'length')"
          if [ "$queued_count" -eq 0 ]; then
            gh workflow run pages.yml --ref main --repo ${{ github.repository }}
          else
            echo "A newer monitor run is already queued; skipping self-dispatch."
          fi
