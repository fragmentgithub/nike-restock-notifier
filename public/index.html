<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nike Restock Notifier</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Nike Restock Notifier</p>
          <h1>リストック監視</h1>
        </div>
        <div class="status-pill" id="runStatus">停止中</div>
      </section>

      <section class="layout">
        <form class="panel settings-panel" id="settingsForm">
          <div class="section-title">
            <h2>監視設定</h2>
            <button type="button" class="icon-button" id="notifyButton" title="ブラウザ通知を許可">
              <span aria-hidden="true">🔔</span>
            </button>
          </div>

          <label>
            <span>Nike商品URL</span>
            <input id="productUrl" name="productUrl" type="url" required />
          </label>

          <label>
            <span>対象サイズ</span>
            <input
              id="sizeFilters"
              name="sizeFilters"
              type="text"
              placeholder="例: 26, 26.5, 27 / 空欄なら全サイズ"
            />
          </label>

          <div class="field-grid">
            <label>
              <span>確認間隔</span>
              <div class="input-with-unit">
                <input id="intervalSeconds" name="intervalSeconds" type="number" min="30" max="3600" step="30" />
                <span>秒</span>
              </div>
            </label>
            <label>
              <span>Discord webhook</span>
              <input id="discordWebhook" name="discordWebhook" type="url" placeholder="任意" />
            </label>
          </div>

          <div class="actions">
            <button type="submit" class="primary">保存</button>
            <button type="button" id="startButton">開始</button>
            <button type="button" id="stopButton">停止</button>
            <button type="button" id="checkButton">今すぐ確認</button>
          </div>

          <p class="hint" id="webhookHint">Discord webhookは未設定です。</p>
        </form>

        <section class="panel current-panel">
          <div class="section-title">
            <h2>現在の状態</h2>
            <div class="small-status" id="checkStatus">待機中</div>
          </div>

          <div class="product-row">
            <div class="product-image" id="productImage"></div>
            <div class="product-meta">
              <h3 id="productTitle">商品データ未取得</h3>
              <p id="productSubtitle"></p>
              <a id="productLink" href="#" target="_blank" rel="noreferrer">商品ページを開く</a>
            </div>
          </div>

          <div class="metric-grid">
            <div>
              <span>判定</span>
              <strong id="stockStatus">未確認</strong>
            </div>
            <div>
              <span>最終確認</span>
              <strong id="lastChecked">-</strong>
            </div>
            <div>
              <span>次回確認</span>
              <strong id="nextCheck">-</strong>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>サイズ</th>
                  <th>状態</th>
                  <th>在庫レベル</th>
                </tr>
              </thead>
              <tbody id="sizeRows">
                <tr>
                  <td colspan="3">まだ確認していません。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="panel log-panel">
        <div class="section-title">
          <h2>履歴</h2>
          <button type="button" id="testDiscordButton">Discordテスト</button>
        </div>
        <ol id="eventLog" class="event-log"></ol>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
