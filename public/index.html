<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nike Restock Notifier</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Nike Restock Notifier</p>
          <h1>リストック監視</h1>
        </div>
        <div class="status-pill" id="runStatus">停止中</div>
      </section>

      <section class="layout">
        <section class="panel settings-panel">
          <div class="section-title">
            <h2>監視設定</h2>
            <span class="small-status ok">GitHub Actions</span>
          </div>

          <div class="settings-summary">
            <div>
              <span>対象サイズ</span>
              <strong id="sizeFiltersDisplay">全サイズ</strong>
            </div>
            <div>
              <span>巡回後の待機</span>
              <strong id="intervalDisplay">-</strong>
            </div>
            <div>
              <span>実行時間</span>
              <strong id="loopDisplay">-</strong>
            </div>
            <div>
              <span>Discord</span>
              <strong id="discordDisplay">-</strong>
            </div>
          </div>

          <p class="hint" id="discoveryHint">新カラー自動追尾: 初回探索待ち</p>
          <div class="pages-links">
            <a href="https://github.com/fragmentgithub/nike-restock-notifier/actions/workflows/pages.yml" target="_blank" rel="noreferrer">Monitor</a>
            <a href="https://github.com/fragmentgithub/nike-restock-notifier/actions/workflows/discord-test.yml" target="_blank" rel="noreferrer">Discord Test</a>
            <a href="https://github.com/fragmentgithub/nike-restock-notifier/settings/secrets/actions" target="_blank" rel="noreferrer">Secrets</a>
            <a href="https://github.com/fragmentgithub/nike-restock-notifier/settings/variables/actions" target="_blank" rel="noreferrer">Variables</a>
          </div>
        </section>

        <section class="panel current-panel">
          <div class="section-title">
            <h2>現在の状態</h2>
            <div class="small-status" id="checkStatus">待機中</div>
          </div>

          <div class="metric-grid metric-grid-four">
            <div>
              <span>追跡商品</span>
              <strong id="productCount">0</strong>
            </div>
            <div>
              <span>在庫あり商品</span>
              <strong id="availableProductCount">0</strong>
            </div>
            <div>
              <span>最終確認</span>
              <strong id="lastChecked">-</strong>
            </div>
            <div>
              <span>次回確認</span>
              <strong id="nextCheck">-</strong>
            </div>
          </div>

          <p class="hint error-hint" id="monitorErrorHint" hidden></p>

          <div class="product-grid" id="productGrid"></div>
        </section>
      </section>

      <section class="panel insights-panel">
        <div class="section-title">
          <h2>監視品質（直近24時間）</h2>
          <div class="small-status" id="qualityStatus">集計待ち</div>
        </div>
        <div class="metric-grid quality-grid">
          <div><span>成功率</span><strong id="successRate">-</strong></div>
          <div><span>平均応答</span><strong id="averageResponse">-</strong></div>
          <div><span>確認回数</span><strong id="checks24h">-</strong></div>
          <div><span>最終成功</span><strong id="lastSuccess">-</strong></div>
          <div><span>稼働中商品</span><strong id="activeProductCount">-</strong></div>
          <div><span>自動休止</span><strong id="pausedProductCount">-</strong></div>
        </div>
      </section>

      <section class="panel history-panel">
        <div class="section-title">
          <h2>在庫変化履歴</h2>
        </div>
        <ol id="stockHistory" class="event-log"></ol>
      </section>

      <section class="panel log-panel">
        <div class="section-title">
          <h2>履歴</h2>
        </div>
        <ol id="eventLog" class="event-log"></ol>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
